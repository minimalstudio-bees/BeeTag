<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEETAG - Minimal Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #f39c12; --dark: #2c3e50; --light: #ecf0f1; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--light); margin: 0; padding-bottom: 100px; }
        header { background: #1a252f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); letter-spacing: 2px; }
        .container { padding: 15px; }
        .card { background: #34495e; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #456789; padding-bottom: 5px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; opacity: 0.8; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #2c3e50; color: white; box-sizing: border-box; }
        .alarm-badge { background: var(--red); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; margin-top: 10px; display: none; text-align: center; }
        .btn-save { position: fixed; bottom: 60px; right: 15px; background: var(--primary); color: var(--dark); border: none; padding: 15px 25px; border-radius: 50px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 999; }
        .footer-brand { text-align: center; padding: 20px; font-size: 0.75rem; opacity: 0.6; }
        .footer-brand a { color: var(--primary); text-decoration: none; }
        .history-item { background: #2c3e50; margin-bottom: 10px; padding: 12px; border-radius: 5px; border-left: 4px solid var(--primary); font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">BEETAG</div>
    <div id="arnia-id" style="font-weight: bold;">Arnia: --</div>
</header>

<div class="container">
    <!-- REGINA -->
    <div class="card">
        <h3><i class="fas fa-crown"></i> REGINA</h3>
        <div class="grid">
            <div class="input-group">
                <label>Stato</label>
                <select id="regina-stato">
                    <option value="Vista">Vista</option>
                    <option value="Uova">Uova (Non vista)</option>
                    <option value="Assente">Assente</option>
                    <option value="Cella Reale">Cella Reale</option>
                </select>
            </div>
            <div class="input-group">
                <label>Colore 2026</label>
                <div id="colore-anno" style="padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; color: white;">Verde</div>
            </div>
        </div>
    </div>

    <!-- BLOCCO COVATA -->
    <div class="card">
        <h3><i class="fas fa-pause-circle"></i> BLOCCO COVATA</h3>
        <div class="input-group">
            <label>Data Inizio Blocco</label>
            <input type="date" id="data-blocco" onchange="calcolaSblocco()">
        </div>
        <div id="alarm-sblocco" class="alarm-badge">
            <i class="fas fa-exclamation-triangle"></i> SBLOCCO TRA: <span id="giorni-mancanti">--</span> GG
        </div>
    </div>

    <!-- SCIAMATURA -->
    <div class="card">
        <h3><i class="fas fa-biohazard"></i> SCIAMATURA</h3>
        <div class="grid">
            <div class="input-group">
                <label>Data Ritrovamento</label>
                <input type="date" id="data-celle">
            </div>
            <div class="input-group">
                <label>Tipo Celle</label>
                <select id="tipo-celle">
                    <option value="Nessuna">Nessuna</option>
                    <option value="Cupolini">Cupolini</option>
                    <option value="Aperte">Celle Aperte</option>
                    <option value="Chiuse">Celle Chiuse</option>
                </select>
            </div>
        </div>
    </div>

    <!-- STORICO -->
    <div class="card">
        <h3><i class="fas fa-history"></i> STORICO DETTAGLIATO</h3>
        <div id="storico-lista"></div>
    </div>
</div>

<button class="btn-save" onclick="salvaVisita()">
    <i class="fas fa-save"></i> SALVA VISITA
</button>

<div class="footer-brand">
    Minimal Studio Bees Project | <a href="https://linktr.ee/minimal_studio">Linktree</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const arnia = urlParams.get('a') || 'Generica';
    document.getElementById('arnia-id').innerText = "Arnia: " + arnia;

    // Colore Regina 2026
    document.getElementById('colore-anno').style.backgroundColor = "#27ae60";

    function calcolaSblocco() {
        const dataInizio = document.getElementById('data-blocco').value;
        if (!dataInizio) return;
        
        const inizio = new Date(dataInizio);
        const oggi = new Date();
        const diffTempo = oggi - inizio;
        const giorniTrascorsi = Math.floor(diffTempo / (1000 * 60 * 60 * 24));
        const mancanti = 21 - giorniTrascorsi;

        const badge = document.getElementById('alarm-sblocco');
        if (mancanti >= 0) {
            badge.style.display = "block";
            document.getElementById('giorni-mancanti').innerText = mancanti;
        } else {
            badge.style.display = "none";
        }
    }

    function salvaVisita() {
        const data = {
            giorno: new Date().toLocaleDateString('it-IT'),
            regina: document.getElementById('regina-stato').value,
            blocco: document.getElementById('data-blocco').value || 'No',
            celle: document.getElementById('tipo-celle').value,
            dataCelle: document.getElementById('data-celle').value || '-'
        };
        
        let storico = JSON.parse(localStorage.getItem('bee_data_' + arnia)) || [];
        storico.unshift(data);
        localStorage.setItem('bee_data_' + arnia, JSON.stringify(storico.slice(0, 15)));
        aggiornaStorico();
        alert("Dati Arnia " + arnia + " salvati!");
    }

    function aggiornaStorico() {
        let storico = JSON.parse(localStorage.getItem('bee_data_' + arnia)) || [];
        const lista = document.getElementById('storico-lista');
        lista.innerHTML = storico.map(item => `
            <div class="history-item">
                <strong><i class="far fa-calendar-alt"></i> ${item.giorno}</strong><br>
                <i class="fas fa-crown"></i> Regina: ${item.regina}<br>
                <i class="fas fa-pause-circle"></i> Blocco: ${item.blocco}<br>
                <i class="fas fa-exclamation-circle"></i> Celle: ${item.celle} (${item.dataCelle})
            </div>
        `).join('');
    }

    aggiornaStorico();
</script>

</body>
</html>
