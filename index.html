<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEETAG - Minimal Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #f39c12; --dark: #1a252f; --card-bg: #2c3e50; --text: #ffffff; --red: #e74c3c; --green: #27ae60; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #121a21; color: var(--text); margin: 0; padding-bottom: 120px; }
        
        /* HEADER PROFESSIONALE */
        header { background: var(--dark); padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .logo { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 2.5rem; color: #ffffff; letter-spacing: 5px; line-height: 1; text-shadow: 2px 2px 0px var(--primary); }
        .arnia-badge { background: var(--primary); color: var(--dark); padding: 8px 15px; border-radius: 5px; font-weight: 900; font-size: 1.2rem; }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid rgba(243, 156, 18, 0.3); padding-bottom: 10px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; opacity: 0.9; }
        
        select, input, textarea { width: 100%; padding: 12px; border-radius: 6px; border: 2px solid transparent; background: #1a252f; color: white; font-size: 1rem; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); outline: none; }
        
        .colore-regina { padding: 12px; border-radius: 6px; text-align: center; font-weight: 900; letter-spacing: 1px; border: 2px solid rgba(255,255,255,0.2); }
        .alarm-box { background: rgba(231, 76, 60, 0.2); border: 2px solid var(--red); color: #ff9999; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; font-weight: bold; }
        
        /* BOTTONE SALVA */
        .btn-save { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--primary); color: var(--dark); border: none; padding: 18px; border-radius: 50px; font-weight: 900; font-size: 1.3rem; box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4); z-index: 999; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-save:active { transform: translateX(-50%) scale(0.95); }

        .history-item { background: #1a252f; margin-bottom: 12px; padding: 15px; border-radius: 8px; border-left: 6px solid var(--primary); box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .history-date { color: var(--primary); font-weight: 900; font-size: 1rem; margin-bottom: 5px; display: block; }
        .footer-text { text-align: center; font-size: 0.8rem; opacity: 0.5; padding: 20px; letter-spacing: 1px; }
        .footer-text a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo">BEETAG</div>
    <div id="arnia-num" class="arnia-badge">A --</div>
</header>

<div class="container">
    <!-- SEZIONE REGINA -->
    <div class="card">
        <h3><i class="fas fa-crown"></i> Regina</h3>
        <div class="grid">
            <div class="input-group">
                <label>Stato Reale</label>
                <select id="reg-status">
                    <option value="Vista">VISTA</option>
                    <option value="Uova">UOVA (Presenti)</option>
                    <option value="Assente">ASSENTE</option>
                    <option value="Cella">CELLA REALE</option>
                </select>
            </div>
            <div class="input-group">
                <label>Marcatura 2026</label>
                <div class="colore-regina" style="background: var(--green);">VERDE</div>
            </div>
        </div>
    </div>

    <!-- SEZIONE SCIAMATURA & CELLE -->
    <div class="card">
        <h3><i class="fas fa-exclamation-triangle"></i> Controllo Sciamatura</h3>
        <div class="grid">
            <div class="input-group">
                <label>Ritrovamento</label>
                <input type="date" id="cell-date">
            </div>
            <div class="input-group">
                <label>Tipo Celle</label>
                <select id="cell-type">
                    <option value="Nessuna">NESSUNA</option>
                    <option value="Cupolini">CUPOLINI</option>
                    <option value="Aperte">APERTE</option>
                    <option value="Chiuse">CHIUSE</option>
                </select>
            </div>
        </div>
    </div>

    <!-- SEZIONE BLOCCO COVATA -->
    <div class="card">
        <h3><i class="fas fa-clock"></i> Blocco Covata</h3>
        <label>Inizio Trattamento / Blocco</label>
        <input type="date" id="block-start" onchange="checkBlock()">
        <div id="block-alarm" class="alarm-box">
            <i class="fas fa-hourglass-half"></i> SBLOCCO TRA: <span id="days-left">--</span> GIORNI
        </div>
    </div>

    <!-- NOTE E STORICO -->
    <div class="card">
        <h3><i class="fas fa-clipboard-list"></i> Note Visita</h3>
        <textarea id="visit-notes" rows="2" placeholder="Esempio: Famiglia forte, aggiunto melario..."></textarea>
    </div>

    <div class="card">
        <h3><i class="fas fa-history"></i> Storico Minimal Studio</h3>
        <div id="history-content">
            <p style="text-align:center; opacity:0.5;">Nessun dato registrato</p>
        </div>
    </div>
</div>

<button class="btn-save" onclick="saveData()">
    <i class="fas fa-save"></i> SALVA VISITA
</button>

<div class="footer-text">
    PROGETTO <a href="https://linktr.ee/minimal_studio" target="_blank">MINIMAL STUDIO</a> &copy; 2026
</div>

<script>
    // Recupero Parametro Arnia
    const params = new URLSearchParams(window.location.search);
    const aID = params.get('a') || '0';
    document.getElementById('arnia-num').innerText = "A " + aID;

    // Gestione Blocco Covata (21 giorni)
    function checkBlock() {
        const dateVal = document.getElementById('block-start').value;
        if (!dateVal) return;
        const start = new Date(dateVal);
        const today = new Date();
        const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        const remaining = 21 - diff;
        
        const alarm = document.getElementById('block-alarm');
        if (remaining >= 0) {
            alarm.style.display = "block";
            document.getElementById('days-left').innerText = remaining;
        } else {
            alarm.style.display = "none";
        }
    }

    // Salvataggio e Storico
    function saveData() {
        const visit = {
            ts: new Date().toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}),
            rs: document.getElementById('reg-status').value,
            ct: document.getElementById('cell-type').value,
            cd: document.getElementById('cell-date').value || '-',
            bs: document.getElementById('block-start').value || 'No',
            nt: document.getElementById('visit-notes').value || 'Nessuna nota'
        };

        let storageKey = 'minimal_bees_v4_' + aID;
        let logs = JSON.parse(localStorage.getItem(storageKey)) || [];
        logs.unshift(visit);
        localStorage.setItem(storageKey, JSON.stringify(logs.slice(0, 20)));
        
        renderHistory();
        alert("Visita Arnia " + aID + " archiviata correttamente!");
        document.getElementById('visit-notes').value = "";
    }

    function renderHistory() {
        let storageKey = 'minimal_bees_v4_' + aID;
        let logs = JSON.parse(localStorage.getItem(storageKey)) || [];
        const container = document.getElementById('history-content');
        
        if (logs.length === 0) return;
        
        container.innerHTML = logs.map(l => `
            <div class="history-item">
                <span class="history-date">${l.ts}</span>
                <div style="font-size:0.9rem; line-height:1.5;">
                    <strong>Regina:</strong> ${l.rs} | <strong>Celle:</strong> ${l.ct}<br>
                    <strong>Data Celle:</strong> ${l.cd} | <strong>Blocco:</strong> ${l.bs}<br>
                    <p style="margin:5px 0 0 0; color:#bdc3c7; font-style:italic;">"${l.nt}"</p>
                </div>
            </div>
        `).join('');
    }

    renderHistory();
</script>

</body>
</html>
