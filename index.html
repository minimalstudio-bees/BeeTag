<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEETAG - Minimal Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #f39c12; --dark: #1a252f; --card-bg: #2c3e50; --text: #ecf0f1; --red: #e74c3c; --green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #121a21; color: var(--text); margin: 0; padding-bottom: 120px; }
        
        header { background: var(--dark); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.8rem; color: var(--primary); letter-spacing: 2px; }
        .arnia-info { font-weight: bold; font-size: 1.1rem; color: var(--primary); }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid rgba(243, 156, 18, 0.3); padding-bottom: 5px; font-size: 1rem; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; font-weight: bold; }
        
        select, input, textarea { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #1a252f; color: white; box-sizing: border-box; }
        
        .colore-box { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; background: var(--green); color: white; }
        .alarm { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--red); color: #ff9999; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; text-align: center; }
        
        .btn-save { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: var(--primary); color: var(--dark); border: none; padding: 15px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 999; }

        .history-item { background: #1a252f; margin-bottom: 10px; padding: 12px; border-radius: 5px; border-left: 5px solid var(--primary); font-size: 0.9rem; }
        .footer { text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.6; }
        .footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">BEETAG</div>
    <div id="arnia-display" class="arnia-info">Arnia --</div>
</header>

<div class="container">
    <div class="card">
        <h3><i class="fas fa-crown"></i> Regina</h3>
        <div class="grid">
            <div class="input-group">
                <label>Stato</label>
                <select id="reg-status">
                    <option value="Vista">Vista</option>
                    <option value="Uova">Uova</option>
                    <option value="Assente">Assente</option>
                    <option value="Cella">Cella Reale</option>
                </select>
            </div>
            <div class="input-group">
                <label>Colore 2026</label>
                <div class="colore-box">VERDE</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-biohazard"></i> Sciamatura</h3>
        <div class="grid">
            <div class="input-group">
                <label>Data Ritrovamento</label>
                <input type="date" id="cell-date">
            </div>
            <div class="input-group">
                <label>Tipo Celle</label>
                <select id="cell-type">
                    <option value="Nessuna">Nessuna</option>
                    <option value="Cupolini">Cupolini</option>
                    <option value="Aperte">Aperte</option>
                    <option value="Chiuse">Chiuse</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-pause-circle"></i> Blocco Covata</h3>
        <label>Data Inizio</label>
        <input type="date" id="block-start" onchange="updateBlock()">
        <div id="block-msg" class="alarm">
            SBLOCCO TRA: <span id="days">--</span> GIORNI
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-sticky-note"></i> Note</h3>
        <textarea id="notes" rows="2" placeholder="Dettagli visita..."></textarea>
    </div>

    <div class="card">
        <h3><i class="fas fa-history"></i> Storico</h3>
        <div id="log-list"></div>
    </div>
</div>

<button class="btn-save" onclick="save()">SALVA VISITA</button>

<div class="footer">
    Progetto <a href="https://linktr.ee/minimal_studio" target="_blank">Minimal Studio</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('a') || 'Generica';
    document.getElementById('arnia-display').innerText = "Arnia " + id;

    function updateBlock() {
        const val = document.getElementById('block-start').value;
        if (!val) return;
        const d = Math.floor((new Date() - new Date(val)) / (1000*60*60*24));
        const r = 21 - d;
        document.getElementById('block-msg').style.display = r >= 0 ? "block" : "none";
        document.getElementById('days').innerText = r;
    }

    function save() {
        const entry = {
            date: new Date().toLocaleString('it-IT'),
            reg: document.getElementById('reg-status').value,
            cel: document.getElementById('cell-type').value,
            cd: document.getElementById('cell-date').value || '-',
            blk: document.getElementById('block-start').value || 'No',
            txt: document.getElementById('notes').value || '-'
        };
        let data = JSON.parse(localStorage.getItem('bt_data_' + id)) || [];
        data.unshift(entry);
        localStorage.setItem('bt_data_' + id, JSON.stringify(data.slice(0, 15)));
        showLogs();
        alert("Dati salvati!");
        document.getElementById('notes').value = "";
    }

    function showLogs() {
        let data = JSON.parse(localStorage.getItem('bt_data_' + id)) || [];
        document.getElementById('log-list').innerHTML = data.map(i => `
            <div class="history-item">
                <strong>${i.date}</strong><br>
                R: ${i.reg} | C: ${i.cel} (${i.cd})<br>
                Blocco: ${i.blk} | Note: ${i.txt}
            </div>
        `).join('');
    }
    showLogs();
</script>
</body>
</html>
