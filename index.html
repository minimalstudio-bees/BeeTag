<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEETAG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #bcaf9f; --card: #fdfcfb; --text: #4a443f; --accent: #d4a373; --ok: #6b705c; --danger: #9e2a2b; --header: #2c2a28; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        header { background: var(--header); color: #fff; padding: 15px; text-align: center; font-weight: 800; font-size: 20px; letter-spacing: 2px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 12px; max-width: 600px; margin: auto; }

        /* BOX METEO CON ICONE E GRADI GRANDI */
        .meteo-box { background: #fff; border-radius: 15px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid var(--accent); }
        .meteo-temp { font-size: 48px; font-weight: 900; color: var(--header); }
        .meteo-icon { font-size: 55px; color: #f39c12; }

        /* MESSAGGIO IN ROSSO PER PROSSIMA VISITA */
        #alert-box { display: none; background: var(--danger); color: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; font-weight: 900; font-size: 18px; border: 4px solid #fff; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        .section { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { font-size: 12px; text-transform: uppercase; color: #8a817c; border-bottom: 1px solid #f0edea; padding-bottom: 8px; margin-top: 0; margin-bottom: 15px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-opt { min-height: 65px; display: flex; align-items: center; justify-content: center; border: 2px solid #e0d9d1; border-radius: 12px; text-align: center; font-size: 12px; cursor: pointer; font-weight: 800; background: #fff; text-transform: uppercase; }
        .btn-opt.active { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
        .btn-opt.alert.active { background: var(--danger) !important; border-color: var(--danger) !important; }

        input, select, textarea { width: 100%; padding: 18px; border: 2px solid #e0d9d1; border-radius: 12px; margin-bottom: 12px; font-size: 16px; font-weight: 700; box-sizing: border-box; }
        .btn-save { position: fixed; bottom: 15px; left: 15px; right: 15px; padding: 22px; border: none; border-radius: 18px; font-weight: 900; background: var(--ok); color: #fff; font-size: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 999; }
    </style>
</head>
<body>

<header>TAG ARNIA <span id="view-id">?</span></header>

<div class="container">
    <div class="meteo-box">
        <div id="meteo-icon-div" class="meteo-icon"><i class="fas fa-sun"></i></div>
        <div id="meteo-temp" class="meteo-temp">--°C</div>
    </div>

    <div id="alert-box"><i class="fas fa-exclamation-triangle"></i> ATTENZIONE: <span id="alert-msg"></span></div>

    <div class="section">
        <h2>Forza e Covata</h2>
        <div class="grid" id="forza-group">
            <div class="btn-opt" onclick="selectOne(this)">FORTE</div>
            <div class="btn-opt" onclick="selectOne(this)">MEDIA</div>
            <div class="btn-opt" onclick="selectOne(this)">DEBOLE</div>
        </div>
        <div class="grid">
            <div class="btn-opt" onclick="selectMulti(this)">COV. FRESCA</div>
            <div class="btn-opt" onclick="selectMulti(this)">COV. OPERCOLATA</div>
            <div class="btn-opt" onclick="selectMulti(this)">SCORTE</div>
        </div>
        <input type="number" id="favi" placeholder="N° Telaini Covata">
    </div>

    <div class="section">
        <h2>Regina e Sciamatura</h2>
        <div class="grid">
            <div class="btn-opt" onclick="selectMulti(this)">VISTA</div>
            <div class="btn-opt" onclick="selectMulti(this)">MARCATA</div>
            <div class="btn-opt alert" id="btn-celle" onclick="selectMulti(this)">CELLE REALI</div>
        </div>
        <select id="regina-colore">
            <option value="">Colore Regina...</option>
            <option value="Verde">Verde (2024)</option>
            <option value="Blu">Blu (2025)</option>
            <option value="Bianco">Bianco (2026)</option>
            <option value="Giallo">Giallo (2027)</option>
            <option value="Rosso">Rosso (2028)</option>
        </select>
    </div>

    <div class="section">
        <h2>Tecnica e Blocco</h2>
        <div class="grid">
            <div class="btn-opt" onclick="selectMulti(this)">FOGLI CEREI</div>
            <div class="btn-opt" onclick="selectMulti(this)">NUTRIZIONE</div>
            <div class="btn-opt" id="btn-blocco" onclick="selectMulti(this)">BLOCCO COVATA</div>
        </div>
        <select id="farmaco">
            <option value="Nessuno">Nessun Trattamento</option>
            <option value="Apivar">Apivar</option>
            <option value="Timolo">Timolo</option>
            <option value="Ossalico">Ossalico</option>
            <option value="Formico">Formico</option>
        </select>
    </div>

    <div class="section">
        <h2>Produzione Melari</h2>
        <input type="number" id="n_melari" placeholder="N° Melari">
        <div class="grid" id="melari-stato">
            <div class="btn-opt" onclick="selectOne(this)">VUOTI</div>
            <div class="btn-opt" onclick="selectOne(this)">IN LAVORO</div>
            <div class="btn-opt" onclick="selectOne(this)">PIENI</div>
        </div>
    </div>

    <textarea id="note-text" placeholder="Note visita..."></textarea>
    <button class="btn-save" onclick="saveAll()">SALVA VISITA</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('a') || "0";
    document.getElementById('view-id').innerText = id;

    window.onload = () => {
        const h = JSON.parse(localStorage.getItem('beetag_' + id));
        if(h) {
            if(h.celle || h.blocco || h.forza === "DEBOLE") {
                document.getElementById('alert-box').style.display = 'block';
                let m = [];
                if(h.celle) m.push("CELLE REALI");
                if(h.blocco) m.push("BLOCCO ATTIVO");
                if(h.forza === "DEBOLE") m.push("FAMIGLIA DEBOLE");
                document.getElementById('alert-msg').innerText = m.join(" / ");
            }
        }
        caricaMeteo();
    };

    async function caricaMeteo() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                document.getElementById('meteo-temp').innerText = temp + "°C";
                
                let icon = '<i class="fas fa-sun"></i>';
                if(code > 3) icon = '<i class="fas fa-cloud"></i>';
                if(code > 50) icon = '<i class="fas fa-cloud-rain"></i>';
                document.getElementById('meteo-icon-div').innerHTML = icon;
            });
        }
    }

    function selectOne(el) {
        el.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    function selectMulti(el) { el.classList.toggle('active'); }

    function saveAll() {
        const d = {
            forza: document.querySelector('#forza-group .active')?.innerText || "ND",
            note: document.getElementById('note-text').value,
            celle: document.getElementById('btn-celle').classList.contains('active'),
            blocco: document.getElementById('btn-blocco').classList.contains('active')
        };
        localStorage.setItem('beetag_' + id, JSON.stringify(d));
        alert("Salvato correttamente!");
        location.reload();
    }
</script>
</body>
</html>
